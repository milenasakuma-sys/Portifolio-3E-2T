<!DOCTYPE html> <!--o DocType indica a linguagem de programação que está\\-->
<html lang="pt-br"> <!--inicio do codigo\\-->
<head> <!--inicio do cabeçalho do documento. Dentro desse tag pode ser inseridas folhas de estilo e scrip \\-->
    <meta charset="UTF-8"> <!--indica qual será os caracteres \\-->
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title> <!-- titulo do projeto \\-->
</head> <!--fim do cabeçalho do documento\\-->
<body> <!--nesse espaço está contido o conteúdo visual da página. As tags que representam texto, botôes e outros devem ser adicionados nesse intervalo \\-->
    <!-- Um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como o caso da tag meta. Outro aspecto importante da linguagem é que ela é case insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minusculas. \\-->
     <!-- No HTML há seis niveis de cabeçalho/titulos que podem ser usados por meio das tags h1, h2, h3, h4,h5 e h6, sendo o h1 o maior e mais relevante e o h6 o menor/menos relevante. \\--> 
      <h1> Portifólio</h1>
      <h2> Programação</h2>
      <h3> HTML</h3>
      <h4> CSS</h4>
      <h5>JS</h5>
      <h6> Matemática</h6>
      <!-- Parágrafos de texto são gerados em HTML por meio das tags <p> <\p>. Esse é um exemplo de tag cuja disposição na tela se dá em forma de -->
</body> <!-- fechamento da tag.\\-->
</html> <!-- fim do código \\-->
